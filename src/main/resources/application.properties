# ============================================================
# ms-reasignacion | Microservicio de Reasignación Automática
# Sistema RedNorte
# ============================================================

# --- Servidor ---
server.port=8084
spring.application.name=ms-reasignacion

# --- DataSource MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/db_reasignacion?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Feign ---
spring.cloud.openfeign.client.config.default.connect-timeout=5000
spring.cloud.openfeign.client.config.default.read-timeout=5000

# URL del ms-lista-espera
ms.lista-espera.url=http://localhost:8082

# --- Swagger / OpenAPI ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true

# --- Logging ---
logging.level.com.rednorte.ms_reasignacion=DEBUG
logging.level.org.springframework.web=INFO